<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hệ sinh thái Công nghệ & Giáo dục BMT (BMT Tech & Edu)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
/* ============================================================================
   EduHub — styles
   Palette: ink #0f1b2d / blue #2453d6 / teal accent #0bb5a3 / amber #f59e0b
============================================================================ */
:root{
  --ink:#0f1b2d; --ink-2:#27384f; --muted:#5b6b82; --line:#e3e8f0;
  --bg:#f5f7fb; --surface:#ffffff; --surface-2:#f0f4fa;
  --blue:#2453d6; --blue-d:#1b3fa8; --teal:#0bb5a3; --amber:#f59e0b;
  --green:#16a34a; --red:#dc2626;
  --radius:14px; --radius-sm:9px; --shadow:0 1px 2px rgba(15,27,45,.06),0 8px 24px rgba(15,27,45,.06);
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit}
img{max-width:100%}
.hidden{display:none !important}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;background:var(--blue);color:#fff;
  padding:9px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;cursor:pointer;transition:.15s}
.btn:hover{background:var(--blue-d)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.secondary{background:var(--surface);color:var(--ink);border-color:var(--line)}
.btn.secondary:hover{background:var(--surface-2)}
.btn.ghost{background:transparent;color:var(--blue);padding:6px 10px}
.btn.ghost:hover{background:var(--surface-2);text-decoration:none}
.btn.danger{background:var(--red)}
.btn.success{background:var(--green)}
.btn.teal{background:var(--teal)}
.btn.sm{padding:6px 11px;font-size:13px}
.btn.block{width:100%;justify-content:center}

/* ---------- forms ---------- */
label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin:0 0 5px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);
  font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(36,83,214,.25);border-color:var(--blue)}
textarea{resize:vertical;min-height:90px}
textarea.code{font-family:var(--mono);font-size:13px;min-height:200px;tab-size:2}
.field{margin-bottom:14px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>.field{flex:1;min-width:160px}
.help{font-size:12px;color:var(--muted);margin-top:4px}

/* ---------- cards / layout ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
.card h3{margin:0 0 14px;font-size:16px}
.grid{display:grid;gap:16px}
.grid.cols-2{grid-template-columns:repeat(2,1fr)}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.muted{color:var(--muted)}
.section-title{display:flex;justify-content:space-between;align-items:center;margin:0 0 16px;gap:12px;flex-wrap:wrap}
.section-title h2{margin:0;font-size:21px;letter-spacing:-.01em}

/* ---------- badges ---------- */
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600;background:var(--surface-2);color:var(--ink-2)}
.badge.blue{background:#e7eeff;color:var(--blue-d)}
.badge.teal{background:#dafaf4;color:#067a6e}
.badge.amber{background:#fef0d6;color:#92590a}
.badge.green{background:#dcfce7;color:#15803d}
.badge.red{background:#fee2e2;color:#b91c1c}
.badge.gray{background:#eef1f6;color:var(--muted)}

/* ---------- tables ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:var(--surface-2);font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
tr:last-child td{border-bottom:none}
td .btn{margin-right:6px}

/* ---------- auth screen ---------- */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr}
.auth-art{background:linear-gradient(160deg,#0f1b2d,#1b3fa8);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.auth-art .circuit{position:absolute;inset:0;opacity:.18;
  background-image:linear-gradient(var(--teal) 1px,transparent 1px),linear-gradient(90deg,var(--teal) 1px,transparent 1px);
  background-size:34px 34px;mask-image:radial-gradient(circle at 70% 30%,#000,transparent 75%)}
.auth-art h1{font-size:34px;line-height:1.1;margin:0 0 14px;letter-spacing:-.02em;position:relative}
.auth-art p{color:#c8d6f5;max-width:420px;position:relative}
.auth-art .feat{position:relative;display:grid;gap:10px;margin-top:auto}
.auth-art .feat div{display:flex;gap:10px;align-items:center;color:#dbe5fb;font-size:14px}
.auth-art .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex:none;box-shadow:0 0 0 4px rgba(11,181,163,.2)}
.auth-panel{display:flex;align-items:center;justify-content:center;padding:32px}
.auth-box{width:100%;max-width:380px}
.auth-box .logo{font-weight:800;font-size:18px;line-height:1.25;letter-spacing:-.01em;margin-bottom:6px}
.auth-box .logo span{color:var(--teal)}
.auth-tabs{display:flex;gap:6px;background:var(--surface-2);padding:4px;border-radius:10px;margin:20px 0}
.auth-tabs button{flex:1;border:none;background:transparent;padding:8px;border-radius:7px;font-weight:600;color:var(--muted);cursor:pointer}
.auth-tabs button.active{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
@media(max-width:860px){.auth-wrap{grid-template-columns:1fr}.auth-art{display:none}}

/* ---------- app shell ---------- */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:var(--ink);color:#cdd8ea;padding:18px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar .brand{font-weight:800;font-size:15.5px;line-height:1.3;color:#fff;padding:6px 10px 16px;letter-spacing:-.01em}
.sidebar .brand span{color:var(--teal)}
.sidebar .navlink{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:#aebbd2;font-weight:500;cursor:pointer;font-size:14.5px;border:none;background:transparent;width:100%;text-align:left}
.sidebar .navlink:hover{background:rgba(255,255,255,.06);color:#fff}
.sidebar .navlink.active{background:var(--blue);color:#fff}
.sidebar .navlink .ic{width:20px;text-align:center}
.sidebar .nav-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6c7c97;padding:14px 12px 4px}
.sidebar .me{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.1);font-size:13px;color:#aebbd2}
.sidebar .me b{color:#fff;display:block}
.main{padding:26px 32px;min-width:0}
.topbar{display:none}
@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:240px;z-index:40;transform:translateX(-100%);transition:.2s}
  .sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.4)}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--ink);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:20}
  .topbar .brand{font-weight:800}
  .main{padding:18px 16px}
  .grid.cols-2,.grid.cols-3{grid-template-columns:1fr}
}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}

/* ---------- modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(15,27,45,.5);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.lg{max-width:780px}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-head h3{margin:0;font-size:18px}
.modal-head .x{border:none;background:transparent;font-size:24px;cursor:pointer;color:var(--muted);line-height:1}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

/* ---------- toast ---------- */
#toasts{position:fixed;right:18px;bottom:18px;z-index:80;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:10px;box-shadow:var(--shadow);font-size:14px;max-width:340px;animation:slide .2s}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}
@keyframes slide{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

/* ---------- misc ---------- */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .em{font-size:34px;margin-bottom:8px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat .n{font-size:30px;font-weight:800;letter-spacing:-.02em}
.stat .l{font-size:13px;color:var(--muted)}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tabbar button{border:none;background:transparent;padding:10px 14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-size:14px}
.tabbar button.active{color:var(--blue);border-bottom-color:var(--blue)}
.list-item{display:flex;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.list-item .ttl{font-weight:600}
.meta{font-size:13px;color:var(--muted)}
.q-card{border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.q-card .opt{display:flex;gap:9px;align-items:center;padding:8px;border-radius:7px;cursor:pointer}
.q-card .opt:hover{background:var(--surface-2)}
.q-card .opt.correct{background:#dcfce7}
.q-card .opt input{width:auto}
.copybar{display:flex;gap:8px;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--mono);font-size:13px;word-break:break-all}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.center-load{display:flex;justify-content:center;padding:50px}

/* ---- code view có tô dòng lỗi ---- */
.codeblock{font-family:var(--mono);font-size:13px;background:#0f1b2d;color:#e3e8f0;border-radius:9px;overflow:auto;max-height:360px;border:1px solid var(--line)}
.codeline{display:flex;gap:0;white-space:pre}
.codeline .ln{flex:none;width:38px;text-align:right;padding:1px 8px;color:#5b6b82;background:rgba(255,255,255,.04);user-select:none}
.codeline .lt{padding:1px 10px;flex:1}
.codeline.bad{background:rgba(220,38,38,.22)}
.codeline.bad .lt{color:#fecaca}
.codeline.bad .ln{background:rgba(220,38,38,.4);color:#fff;cursor:help}

/* ---- bảng điểm: màu theo xếp loại + ô nhập điểm ---- */
tr.g-gold td{background:#fef9c3 !important}
tr.g-silver td{background:#eef1f5 !important}
tr.g-red td{background:#fee2e2 !important}
.grade-in{width:62px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;font:inherit;text-align:center;background:#fff}
.grade-in:focus{outline:2px solid var(--blue);border-color:var(--blue)}

  </style>
</head>

  <script>
/* ============================================================================
   EduHub — app.js  (vanilla JS + Supabase, chạy tĩnh trên GitHub Pages)
============================================================================ */
"use strict";

/* ----------------------------- 0. Khởi tạo ------------------------------ */
const CFG = window.EDUHUB_CONFIG || {};
const SITE = CFG.SITE_NAME || "EduHub";
// Công thức điểm tổng kết (sửa trong config nếu muốn)
const WEIGHTS = Object.assign({ attendance: 0.10, process: 0.60, final: 0.30 }, CFG.GRADE_WEIGHTS || {});
// Quy đổi trạng thái điểm danh ra thang 10
const ATT_PTS = Object.assign({ present: 10, late: 7, excused: 10, absent: 0 }, CFG.ATTENDANCE_POINTS || {});
const r2 = (v) => (v == null ? null : Math.round(v * 100) / 100);
const _avg = (arr) => (arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null);
// Tính điểm tổng kết: trung bình từng phần theo số mục đã có; thiếu phần nào thì
// chia lại trọng số cho các phần còn lại (điểm tạm tính trong khoá học).
function computeFinal(attStatuses, processNorms, finalNorms) {
  const attAvg = attStatuses.length ? _avg(attStatuses.map((s) => (ATT_PTS[s] != null ? ATT_PTS[s] : 0))) : null;
  const procAvg = processNorms.length ? _avg(processNorms) : null;
  const finAvg = finalNorms.length ? _avg(finalNorms) : null;
  const comps = [];
  if (attAvg != null) comps.push([WEIGHTS.attendance, attAvg]);
  if (procAvg != null) comps.push([WEIGHTS.process, procAvg]);
  if (finAvg != null) comps.push([WEIGHTS.final, finAvg]);
  const wsum = comps.reduce((a, [w]) => a + w, 0);
  const total = wsum ? comps.reduce((a, [w, v]) => a + w * v, 0) / wsum : null;
  return { attAvg, procAvg, finAvg, total, attN: attStatuses.length, procN: processNorms.length, finN: finalNorms.length, partial: wsum > 0 && wsum < 0.999 };
}
// Quy điểm 1 bài về thang 10
const norm10 = (score, max) => (max > 0 ? (Number(score) / Number(max)) * 10 : 0);
// Xáo trộn mảng (Fisher–Yates)
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
// Màu nền hàng theo điểm tổng kết
function gradeRowBg(total) {
  if (total == null) return "";
  if (total >= 8) return "background:#fef9c3"; // vàng nhạt (giỏi)
  if (total >= 5) return "background:#eef1f6"; // bạc nhạt (đạt)
  return "background:#fde2e2"; // đỏ nhạt (cần cố gắng)
}
// Tính lại Tổng kết của 1 hàng trong bảng điểm GV (sau khi sửa ô điểm) — không tải lại trang
function recalcGradeRow(tr) {
  const proc = [], fin = [];
  tr.querySelectorAll("input.gcell").forEach((inp) => {
    if (inp.value !== "" && !Number.isNaN(Number(inp.value))) {
      const n = norm10(Number(inp.value), Number(inp.dataset.max));
      (inp.dataset.cat === "final" ? fin : proc).push(n);
    }
  });
  const attAvg = tr.dataset.attavg === "" ? null : Number(tr.dataset.attavg);
  const comps = [];
  if (attAvg != null) comps.push([WEIGHTS.attendance, attAvg]);
  if (proc.length) comps.push([WEIGHTS.process, _avg(proc)]);
  if (fin.length) comps.push([WEIGHTS.final, _avg(fin)]);
  const wsum = comps.reduce((a, [w]) => a + w, 0);
  const total = wsum ? comps.reduce((a, [w, v]) => a + w * v, 0) / wsum : null;
  const partial = wsum > 0 && wsum < 0.999;
  const cell = tr.querySelector(".tot");
  if (cell) cell.innerHTML = (total == null ? "—" : `<b>${r2(total)}</b>`) + (partial ? `<span class="meta"> *</span>` : "");
  tr.setAttribute("style", gradeRowBg(total));
}

// Gợi ý trường theo Tỉnh → (Xã). Cấu trúc trong config: SCHOOLS_BY_AREA = {
//   "Tỉnh Đắk Lắk": ["Trường A","Trường B"],                       // theo tỉnh
//   "Tỉnh X": { "Phường Y": ["Trường C"], "*": ["Trường chung"] }  // theo xã
// }
function schoolsFor(province, ward) {
  const area = (CFG.SCHOOLS_BY_AREA || {})[province];
  if (area) {
    if (Array.isArray(area)) return area;
    if (ward && Array.isArray(area[ward])) return area[ward];
    if (Array.isArray(area["*"])) return area["*"];
    const all = [].concat(...Object.values(area).filter(Array.isArray));
    if (all.length) return all;
  }
  return []; // chưa khai trường cho khu vực này -> không gợi ý (người dùng tự gõ)
}
// Bỏ dấu tiếng Việt
function removeVN(s) {
  return String(s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/đ/g, "d").replace(/Đ/g, "D");
}
// Tên đăng nhập học sinh: bỏ HỌ (từ đầu), ghép tên lót + tên, bỏ dấu, viết liền, thường.
// "Trần Văn Tâm" -> "vantam"
const STUDENT_DOMAIN = CFG.STUDENT_EMAIL_DOMAIN || "student.bmt";
function studentLocalPart(fullName) {
  const parts = removeVN(fullName).trim().split(/\s+/).filter(Boolean);
  const use = parts.length > 1 ? parts.slice(1) : parts; // bỏ họ nếu có nhiều từ
  return use.join("").toLowerCase().replace(/[^a-z0-9]/g, "");
}

function downloadCSV(filename, rows) {
  const cell = (v) => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const csv = "\uFEFF" + rows.map((r) => r.map(cell).join(",")).join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

async function uploadFile(file, folder) {
  const safe = file.name.replace(/[^\w.\-]/g, "_");
  const path = `${folder}/${Date.now()}_${safe}`;
  const { error } = await sb.storage.from("uploads").upload(path, file, { upsert: false });
  if (error) throw error;
  return sb.storage.from("uploads").getPublicUrl(path).data.publicUrl;
}

async function boot() {

    await loadProfile();

  sb.auth.onAuthStateChange((event, sess) => {

    if (!sess && state.view !== "auth" && state.view !== "recovery") { state.user = null; state.profile = null; renderAuth(); }
  });

async function loadProfile() {

  if (error) { toast("Đăng nhập thất bại: " + error.message, "err"); return; }
  const { data: { session } } = await sb.auth.getSession();
  state.user = session.user;

   dùng một client phụ (không lưu session). Yêu cầu TẮT "Confirm email". */
async function adminCreateUser(email, password, full_name, role) {
  const tmp = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, {
    auth: { persistSession: false, autoRefreshToken: false, storageKey: "eduhub-tmp" },
  });
  const { data, error } = await tmp.auth.signUp({
    email, password, options: { data: { full_name, role } },
  });
  if (error) throw error;

  return data.user;
}

function showCredentials(info, onDone) {
  const roleLbl = info.role === "teacher" ? "Giáo viên" : info.role === "admin" ? "Admin" : "Học sinh";
  const combined = `Tài khoản ${roleLbl} — ${SITE}\nEmail: ${info.email}\nMật khẩu: ${info.pass}`;
  showModal("Đã tạo tài khoản ✅", `
    <div class="card" style="margin:0;background:var(--surface-2)">
      <p style="margin:0 0 10px">Đã tạo <b>${esc(info.name || info.email)}</b> (${roleLbl}).
      <b>Hãy lưu lại / gửi ngay thông tin dưới đây</b> — mật khẩu sẽ <u>không xem lại được</u> về sau.</p>
      ${info.personal ? `<p class="help" style="margin:-4px 0 10px">Gửi tới email cá nhân của học sinh: <b>${esc(info.personal)}</b></p>` : ""}
      <div class="field"><label>Email đăng nhập</label>
        <div class="copybar"><span style="flex:1" id="cr-email">${esc(info.email)}</span>
          <button class="btn ghost sm" data-copy="cr-email">Copy</button></div></div>
      <div class="field" style="margin-bottom:0"><label>Mật khẩu</label>
        <div class="copybar"><span style="flex:1" id="cr-pass">${esc(info.pass)}</span>
          <button class="btn ghost sm" data-copy="cr-pass">Copy</button></div></div>
    </div>
    <div class="field" style="margin-top:14px"><label>Hoặc copy cả cụm để dán vào tin nhắn</label>
      <textarea id="cr-all" readonly style="min-height:80px">${esc(combined)}</textarea></div>`,
    `<button class="btn" id="cr-done">Xong</button>`);
  const copyText = async (txt, btn) => {
    try { await navigator.clipboard.writeText(txt); }
    catch { const ta = document.getElementById("cr-all"); ta.focus(); ta.select(); document.execCommand && document.execCommand("copy"); }
    if (btn) { const o = btn.textContent; btn.textContent = "Đã copy"; setTimeout(() => btn.textContent = o, 1200); }
  };
  modalRoot().querySelectorAll("[data-copy]").forEach((b) =>
    b.onclick = () => copyText(document.getElementById(b.dataset.copy).textContent, b));
  document.getElementById("cr-all").onclick = (e) => { e.target.select(); };
  document.getElementById("cr-done").onclick = () => { closeModal(); (onDone || adminUsers)(); };
}

/* Duyệt hồ sơ -> tạo tài khoản học sinh (email tự sinh @student) + thêm vào lớp + hiện mật khẩu */
async function approveRegToAccount(reg) {
  if (!reg) return;
  const base = studentLocalPart(reg.full_name);
  if (!base) return toast("Không tạo được email từ họ tên — kiểm tra lại tên.", "err");
  const personal = (reg.email || "").trim();
  if (!confirm(`Tạo tài khoản học sinh cho "${reg.full_name}"\nEmail đăng nhập: ${base}@${STUDENT_DOMAIN}` + (reg.class_id ? `\nThêm vào lớp: ${reg.course_name || ""}` : "") + "?")) return;
  const pass = Math.random().toString(36).slice(2, 10);
  let userId = null, email = `${base}@${STUDENT_DOMAIN}`, attempt = 0;
  // Tạo tài khoản; nếu trùng email (trùng tên) thì thêm số: vantam2, vantam3...
  while (true) {
    try {
      const u = await adminCreateUser(email, pass, reg.full_name, "student");
      userId = u && u.id; break;
    } catch (err) {
      if (/registered|already|exists/i.test(err.message || "")) {
        attempt++;
        if (attempt > 50) return toast("Quá nhiều tài khoản trùng tên — thử lại sau.", "err");
        email = `${base}${attempt + 1}@${STUDENT_DOMAIN}`;
        continue;
      }
      return toast("Lỗi tạo tài khoản: " + err.message, "err");
    }
  }
  // Thêm vào lớp đã chọn lúc đăng ký (nếu có)
  if (reg.class_id && userId) {
    const { error: me } = await sb.from("class_members").insert({ class_id: reg.class_id, student_id: userId });
    if (me && !/duplicate|unique/i.test(me.message || "")) toast("Lưu ý: không thêm được vào lớp (" + me.message + ")", "err");
  }
  await sb.from("course_registrations").update({ status: "enrolled" }).eq("id", reg.id);
  showCredentials({ name: reg.full_name, email, pass, role: "student", personal }, adminRegs);
}

/* Tải bảng điểm cả lớp: học sinh × các bài tập */
async function exportClassGrades(cid, className) {
  toast("Đang tạo bảng điểm...", "");
  const [{ data: members }, { data: asgs }, { data: att }] = await Promise.all([
    sb.from("class_members").select("student:student_id(id,full_name,email)").eq("class_id", cid),
    sb.from("assignments").select("id,title,max_score,category").eq("class_id", cid).order("created_at"),
    sb.from("attendance").select("student_id,status").eq("class_id", cid),
  ]);
  const asgList = asgs || [];
  const asgIds = asgList.map((a) => a.id);
  let subs = [];
  if (asgIds.length) {
    const { data } = await sb.from("submissions").select("assignment_id,student_id,score").in("assignment_id", asgIds);
    subs = data || [];
  }
  const map = {};
  subs.forEach((s) => { map[s.assignment_id + "|" + s.student_id] = s.score; });
  const attBy = {};
  (att || []).forEach((a) => { (attBy[a.student_id] = attBy[a.student_id] || []).push(a.status); });
  const header = ["Học sinh", "Email", ...asgList.map((a) => `${a.title}${a.category === "final" ? " [Cuối khoá]" : ""} (/${a.max_score})`),
    "Điểm danh(/10)", "Quá trình(/10)", "Cuối khoá(/10)", "TỔNG KẾT(/10)"];
  const rows = [header];
  (members || []).forEach((m) => {
    const st = m.student;
    const procNorms = [], finNorms = [];
    const row = [st.full_name, st.email];
    asgList.forEach((a) => {
      const v = map[a.id + "|" + st.id];
      row.push(v == null ? "" : v);
      if (v != null) { const n = norm10(v, a.max_score); if (a.category === "final") finNorms.push(n); else procNorms.push(n); }
    });
    const f = computeFinal(attBy[st.id] || [], procNorms, finNorms);
    row.push(f.attAvg == null ? "" : r2(f.attAvg), f.procAvg == null ? "" : r2(f.procAvg), f.finAvg == null ? "" : r2(f.finAvg), f.total == null ? "" : r2(f.total));
    rows.push(row);
  });
  if ((members || []).length === 0) return toast("Lớp chưa có học sinh", "err");
  downloadCSV(`bang-diem-${(className || "lop").replace(/\s+/g, "_")}.csv`, rows);
}

/* Bảng điểm cả lớp (giáo viên): học sinh × các bài tập + cột trung bình */
async function tabClassGrades(cid) {
  tabc().innerHTML = loadingHTML();
  const [{ data: members }, { data: asgs }, { data: att }] = await Promise.all([
    sb.from("class_members").select("student:student_id(id,full_name)").eq("class_id", cid),
    sb.from("assignments").select("id,title,max_score,category").eq("class_id", cid).order("created_at"),
    sb.from("attendance").select("student_id,status").eq("class_id", cid),
  ]);
  const asgList = asgs || [];
  const asgIds = asgList.map((a) => a.id);
  let subs = [];
  if (asgIds.length) {
    const { data } = await sb.from("submissions").select("id,assignment_id,student_id,score,graded").in("assignment_id", asgIds);
    subs = data || [];
  }
  const map = {};
  subs.forEach((s) => { map[s.assignment_id + "|" + s.student_id] = s; });
  const attBy = {};
  (att || []).forEach((a) => { (attBy[a.student_id] = attBy[a.student_id] || []).push(a.status); });
  const head = `<tr><th>Học sinh</th><th>Điểm danh</th>${asgList.map((a) => {
    const short = a.title.length > 14 ? a.title.slice(0, 14) + "…" : a.title;
    const tag = a.category === "final" ? " ★" : "";
    return `<th title="${esc(a.title)} (thang /${a.max_score})${a.category === "final" ? " · Cuối khoá" : ""}">${esc(short)}${tag}</th>`;
  }).join("")}<th>Tổng kết</th></tr>`;
  const rows = (members || []).map((m) => {
    const st = m.student; const procNorms = [], finNorms = [];
    const attStatuses = attBy[st.id] || [];
    const attAvg = attStatuses.length ? _avg(attStatuses.map((s) => (ATT_PTS[s] != null ? ATT_PTS[s] : 0))) : null;
    const cells = asgList.map((a) => {
      const s = map[a.id + "|" + st.id];
      if (s && s.score != null) {
        const n = norm10(s.score, a.max_score);
        if (a.category === "final") finNorms.push(n); else procNorms.push(n);
      }
      const note = s && s.score != null && !s.graded ? `<div class="meta">gợi ý</div>` : "";
      return `<td><input class="gcell" type="number" step="0.1" min="0" style="width:62px"
        data-aid="${a.id}" data-sid="${st.id}" data-max="${a.max_score}" data-cat="${a.category || "process"}" data-subid="${s ? s.id : ""}"
        value="${s && s.score != null ? s.score : ""}" />${note}</td>`;
    }).join("");
    const f = computeFinal(attStatuses, procNorms, finNorms);
    const tot = f.total == null ? "—" : `<b>${r2(f.total)}</b>`;
    const attCell = attAvg == null ? `<td class="muted">—</td>` : `<td><b>${r2(attAvg)}</b><div class="meta">${attStatuses.length} buổi</div></td>`;
    const title = `Điểm danh ${f.attN} buổi: ${f.attAvg == null ? "—" : r2(f.attAvg)} ×10% | Quá trình ${f.procN} bài: ${f.procAvg == null ? "—" : r2(f.procAvg)} ×60% | Cuối khoá ${f.finN} bài: ${f.finAvg == null ? "—" : r2(f.finAvg)} ×30%`;
    return `<tr data-attavg="${attAvg == null ? "" : attAvg}" style="${gradeRowBg(f.total)}">
      <td>${esc(st.full_name)}</td>${attCell}${cells}
      <td class="tot" title="${esc(title)}">${tot}${f.partial ? `<span class="meta"> *</span>` : ""}</td></tr>`;
  }).join("");
  tabc().innerHTML = asgList.length
    ? `<div class="pill-row"><button class="btn secondary sm" id="exp-grades2">⬇ Tải bảng điểm (CSV)</button></div>
       <div class="table-wrap"><table><thead>${head}</thead>
       <tbody>${rows || `<tr><td colspan="${asgList.length + 3}" class="empty">Lớp chưa có học sinh.</td></tr>`}</tbody></table></div>
       <p class="meta" style="margin-top:8px">Gõ trực tiếp vào ô điểm để nhập/sửa (kể cả bài kiểm tra trên lớp học sinh không nộp). Màu hàng: <b style="background:#fef9c3;padding:0 4px;border-radius:3px">≥8 giỏi</b> · <b style="background:#eef1f6;padding:0 4px;border-radius:3px">5–8 đạt</b> · <b style="background:#fde2e2;padding:0 4px;border-radius:3px">&lt;5 cần cố gắng</b>. ★ = cuối khoá · "*" = chưa đủ 3 phần (tạm tính) · "gợi ý" = điểm máy Arduino chưa chốt.</p>`
    : `<div class="empty"><div class="em">📊</div><p>Chưa có bài tập nào để tính điểm.</p></div>`;
  const b = document.getElementById("exp-grades2");
  if (b) b.onclick = () => exportClassGrades(cid, state.params.name);
  on("input.gcell", "change", async (e) => {
    const inp = e.currentTarget;
    const val = inp.value.trim();
    const subid = inp.dataset.subid;
    try {
      if (val === "") {
        if (subid) { const { error } = await sb.from("submissions").update({ score: null }).eq("id", subid); if (error) throw error; }
      } else {
        const score = Number(val);
        if (Number.isNaN(score)) return;
        if (subid) {
          const { error } = await sb.from("submissions").update({ score, graded: true }).eq("id", subid); if (error) throw error;
        } else {
          const { data, error } = await sb.from("submissions").insert({ assignment_id: inp.dataset.aid, student_id: inp.dataset.sid, score, graded: true, submitted_at: new Date().toISOString() }).select("id").single();
          if (error) throw error; inp.dataset.subid = data.id;
        }
      }
      recalcGradeRow(inp.closest("tr"));
    } catch (err) { toast("Lỗi lưu điểm: " + err.message, "err"); }
  }, tabc());
}

/* Bảng điểm của học sinh: theo từng lớp, liệt kê điểm từng bài */
async function studentGrades() {
  setContent(`<div class="section-title"><h2>Bảng điểm</h2></div>${loadingHTML()}`);
  const sid = state.profile.id;
  const { data: cms } = await sb.from("class_members").select("class:class_id(id,name)").eq("student_id", sid);
  const classes = (cms || []).map((c) => c.class).filter(Boolean);
  let html = `<div class="section-title"><h2>Bảng điểm</h2></div>`;
  if (!classes.length) { setContent(html + `<div class="empty"><div class="em">📊</div><p>Bạn chưa ở lớp nào.</p></div>`); return; }
  for (const cl of classes) {
    const [{ data: asgs }, { data: att }] = await Promise.all([
      sb.from("assignments").select("id,title,type,max_score,category").eq("class_id", cl.id).order("created_at"),
      sb.from("attendance").select("status").eq("class_id", cl.id).eq("student_id", sid),
    ]);
    const asgList = asgs || [];
    const ids = asgList.map((a) => a.id);
    let subs = [];
    if (ids.length) {
      const { data } = await sb.from("submissions").select("assignment_id,score,graded").eq("student_id", sid).in("assignment_id", ids);
      subs = data || [];
    }
    const map = {}; subs.forEach((s) => map[s.assignment_id] = s);
    const procNorms = [], finNorms = [];
    const rows = asgList.map((a) => {
      const s = map[a.id]; let diem, tt;
      if (s && s.score != null) {
        const n = norm10(s.score, a.max_score);
        if (a.category === "final") finNorms.push(n); else procNorms.push(n);
      }
      const catBadge = a.category === "final" ? `<span class="badge red">Cuối khoá</span>` : `<span class="badge gray">Quá trình</span>`;
      if (!s) { diem = "—"; tt = `<span class="badge gray">Chưa nộp</span>`; }
      else if (s.score == null) { diem = "—"; tt = `<span class="badge amber">Chờ chấm</span>`; }
      else if (!s.graded) { diem = `${s.score}/${a.max_score}`; tt = `<span class="badge blue">Điểm gợi ý</span>`; }
      else { diem = `${s.score}/${a.max_score}`; tt = `<span class="badge green">Đã chấm</span>`; }
      return `<tr><td>${esc(a.title)} ${catBadge}</td><td>${TYPE_LABEL[a.type]}</td><td><b>${diem}</b></td><td>${tt}</td></tr>`;
    }).join("");
    const f = computeFinal((att || []).map((x) => x.status), procNorms, finNorms);
    const fv = (v) => (v == null ? "—" : r2(v));
    const summary = `<div class="card" style="margin:10px 0 0;background:var(--surface-2)">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:baseline">
        <b>Điểm tổng kết</b>
        <span style="font-size:22px;font-weight:800;color:var(--blue)">${f.total == null ? "—" : r2(f.total) + "/10"}</span></div>
      <div class="meta" style="margin-top:6px">
        • Điểm danh (${f.attN} buổi): <b>${fv(f.attAvg)}</b> × 10%<br>
        • Quá trình (${f.procN} bài): <b>${fv(f.procAvg)}</b> × 60%<br>
        • Cuối khoá (${f.finN} bài): <b>${fv(f.finAvg)}</b> × 30%
        ${f.partial ? `<br><i>(*) Chưa đủ 3 phần — điểm tạm tính theo các phần đã có.</i>` : ""}
      </div></div>`;
    html += `<div class="card"><b>${esc(cl.name)}</b>
      ${asgList.length
        ? `<div class="table-wrap" style="margin-top:8px"><table><thead><tr><th>Bài</th><th>Loại</th><th>Điểm</th><th>Trạng thái</th></tr></thead><tbody>${rows}</tbody></table></div>`
        : `<p class="muted" style="margin:6px 0 0">Chưa có bài tập.</p>`}
      ${summary}</div>`;
  }
  setContent(html);
}

        ${typeOpt("file", "Nộp file")}
        ${typeOpt("text", "Tự luận")}
        ${typeOpt("offline", "Kiểm tra trên lớp (giáo viên nhập điểm)")}
        ${typeOpt("random", "Bốc đề thực hành (random nhóm)")}
      </select></div>
    <div class="field"><label>Tiêu đề *</label><input id="ag-title" value="${esc(ex.title || "")}" /></div>
    <div class="field"><label>Mô tả / đề bài</label><textarea id="ag-desc">${esc(ex.description || "")}</textarea></div>
    <div class="row">
      <div class="field"><label>Thời gian mở</label><input id="ag-open" type="datetime-local" value="${toLocalInput(ex.open_time)}" /></div>
      <div class="field"><label>Thời gian đóng</label><input id="ag-close" type="datetime-local" value="${toLocalInput(ex.close_time)}" /></div>
    </div>
    <div class="field"><label>Điểm tối đa</label><input id="ag-max" type="number" value="${ex.max_score ?? 10}" /></div>
    <div class="field"><label>Tính vào điểm tổng kết</label>
      <select id="ag-cat">
        <option value="process" ${ex.category !== "final" ? "selected" : ""}>Bài tập quá trình (60%)</option>
        <option value="final" ${ex.category === "final" ? "selected" : ""}>Kiểm tra cuối khoá (30%)</option>
      </select></div>
    <div id="ag-arduino" class="hidden">
      <div class="field"><label>Từ khoá chấm (cách nhau dấu phẩy)</label>
        <input id="ag-kw" value="${esc(ex.grading_keywords || "")}" placeholder="VD: void setup, void loop, pinMode, digitalWrite, delay" />
        <div class="help">Hệ thống chấm tự động dựa trên cấu trúc & sự xuất hiện của các từ khoá này.</div></div>
      <div class="field"><label>Code mẫu (tham khảo, không bắt buộc)</label><textarea id="ag-ref" class="code">${esc(ex.reference_code || "")}</textarea></div>
    </div>
    <div id="ag-quiz" class="hidden">
      <div class="row">
        <div class="field"><label>Số câu rút ra khi thi (0 = lấy hết)</label><input id="ag-draw" type="number" min="0" value="${ex.draw_count ?? 0}" /></div>
      </div>
      <div class="field"><label><input type="checkbox" id="ag-shuf-o" ${ex.shuffle_options ? "checked" : ""}/> Đảo thứ tự đáp án</label></div>
      <div class="field"><label><input type="checkbox" id="ag-shuf-q" ${ex.shuffle_questions ? "checked" : ""}/> Đảo thứ tự câu hỏi</label></div>
      <h3 style="font-size:14px;margin:6px 0">Ngân hàng câu hỏi</h3>
      <div id="quiz-list"></div>
      <button class="btn secondary sm" id="add-q" type="button">+ Thêm câu hỏi</button>
    </div>
    <div id="ag-random" class="hidden">
      <div class="row">
        <div class="field"><label>Số nhóm (đề chính)</label><input id="ag-gc" type="number" min="1" value="${ex.group_count ?? 10}" /></div>
        <div class="field"><label>Số phương án mỗi đề</label><input id="ag-vc" type="number" min="1" value="${ex.variant_count ?? 3}" /></div>
      </div>
      <div class="help" style="margin-bottom:8px">Tải ảnh đề cho từng ô <b>Nhóm.Phương án</b> (vd 1.1, 1.2…). Học sinh bốc trúng ô nào sẽ thấy ảnh đó. Bỏ trống ô nào thì học sinh chỉ thấy nhãn.</div>
      <div id="de-grid"></div>
    </div>`,
    `<button class="btn secondary" id="ag-cancel">Huỷ</button><button class="btn" id="ag-save">${isEdit ? "Lưu thay đổi" : "Giao bài"}</button>`, "lg");
  const typeSel = document.getElementById("ag-type");
  let quiz = existingQuiz.slice();
  const renderQuiz = () => {
    const imgBox = (i, field, label) => {
      const url = quiz[i][field];
      return `<div style="margin-top:4px">
        <input type="file" accept="image/*" data-q="${i}" data-img="${field}" style="font-size:12px" />
        ${url ? `<div style="margin-top:4px"><img src="${esc(url)}" style="max-height:90px;border-radius:6px;border:1px solid var(--line)" />
          <button class="btn ghost sm" type="button" data-q="${i}" data-imgrm="${field}">Xoá ảnh</button></div>` : ""}
      </div>`;
    };
    document.getElementById("quiz-list").innerHTML = quiz.map((q, i) => `
      <div class="q-card">
        <div style="display:flex;justify-content:space-between"><b>Câu ${i + 1}</b><button class="btn ghost sm" data-rmq="${i}" type="button">Xoá</button></div>
        <div class="field"><input data-q="${i}" data-f="question" value="${esc(q.question)}" placeholder="Nội dung câu hỏi (có thể để trống nếu dùng ảnh)" />
          <label style="margin-top:6px">Ảnh đề (không bắt buộc)</label>${imgBox(i, "question_image")}</div>
        <div class="row">
          ${["a", "b", "c", "d"].map((o) => `<div class="field"><label>${o.toUpperCase()}</label>
            <input data-q="${i}" data-f="option_${o}" value="${esc(q["option_" + o])}" placeholder="Đáp án ${o.toUpperCase()}" />
            ${imgBox(i, "option_" + o + "_image")}</div>`).join("")}
        </div>
        <div class="row">
          <div class="field"><label>Đáp án đúng</label><select data-q="${i}" data-f="correct_option">${["A", "B", "C", "D"].map((c) => `<option value="${c}" ${q.correct_option === c ? "selected" : ""}>${c}</option>`).join("")}</select></div>
          <div class="field"><label>Điểm</label><input data-q="${i}" data-f="points" type="number" value="${q.points}" /></div>
        </div>
      </div>`).join("");
    document.querySelectorAll("[data-rmq]").forEach((b) => b.onclick = () => { quiz.splice(+b.dataset.rmq, 1); renderQuiz(); });
    document.querySelectorAll("[data-f]").forEach((inp) => inp.oninput = () => { quiz[+inp.dataset.q][inp.dataset.f] = inp.value; });
    document.querySelectorAll("[data-imgrm]").forEach((b) => b.onclick = () => { quiz[+b.dataset.q][b.dataset.imgrm] = ""; renderQuiz(); });
    document.querySelectorAll("[data-img]").forEach((inp) => inp.onchange = async () => {
      const f = inp.files[0]; if (!f) return;
      const i = +inp.dataset.q, field = inp.dataset.img;
      toast("Đang tải ảnh...", "");
      try { quiz[i][field] = await uploadFile(f, "quiz"); renderQuiz(); }
      catch (err) { toast("Lỗi tải ảnh: " + err.message, "err"); }
    });
  };
  document.getElementById("add-q").onclick = () => { quiz.push({ question: "", option_a: "", option_b: "", option_c: "", option_d: "", correct_option: "A", points: 1, question_image: "", option_a_image: "", option_b_image: "", option_c_image: "", option_d_image: "" }); renderQuiz(); };
  let deImages = Object.assign({}, ex.de_images || {});
  const renderDeGrid = () => {
    const gc = Math.max(1, Number(document.getElementById("ag-gc").value) || 10);
    const vc = Math.max(1, Number(document.getElementById("ag-vc").value) || 3);
    let html = "";
    for (let g = 1; g <= gc; g++) {
      html += `<div style="margin-bottom:6px"><b>Nhóm ${g}</b><div class="row">`;
      for (let v = 1; v <= vc; v++) {
        const label = g + "." + v, url = deImages[label];
        html += `<div class="field" style="min-width:120px"><label>Đề ${label}</label>
          <input type="file" accept="image/*" data-de="${label}" style="font-size:12px"/>
          ${url ? `<div style="margin-top:4px"><img src="${esc(url)}" style="max-height:70px;border-radius:6px;border:1px solid var(--line)"/>
            <button class="btn ghost sm" type="button" data-derm="${label}">Xoá</button></div>` : ""}</div>`;
      }
      html += `</div></div>`;
    }
    document.getElementById("de-grid").innerHTML = html;
    document.querySelectorAll("[data-de]").forEach((inp) => inp.onchange = async () => {
      const f = inp.files[0]; if (!f) return;
      toast("Đang tải ảnh...", "");
      try { deImages[inp.dataset.de] = await uploadFile(f, "de"); renderDeGrid(); }
      catch (err) { toast("Lỗi tải ảnh: " + err.message, "err"); }
    });
    document.querySelectorAll("[data-derm]").forEach((b) => b.onclick = () => { delete deImages[b.dataset.derm]; renderDeGrid(); });
  };
  ["ag-gc", "ag-vc"].forEach((id) => { const el = document.getElementById(id); if (el) el.onchange = renderDeGrid; });
  const syncType = () => {
    document.getElementById("ag-arduino").classList.toggle("hidden", typeSel.value !== "arduino");
    document.getElementById("ag-quiz").classList.toggle("hidden", typeSel.value !== "quiz");
    document.getElementById("ag-random").classList.toggle("hidden", typeSel.value !== "random");
    if (typeSel.value === "random") renderDeGrid();
  };
  typeSel.onchange = syncType; syncType(); renderQuiz();
  document.getElementById("ag-cancel").onclick = closeModal;
  document.getElementById("ag-save").onclick = async (e) => {
    const title = document.getElementById("ag-title").value.trim();
    if (!title) return toast("Nhập tiêu đề", "err");
    const type = typeSel.value;
    if (type === "quiz" && quiz.length === 0) return toast("Thêm ít nhất 1 câu hỏi", "err");
    e.target.disabled = true; e.target.textContent = "Đang lưu...";
    try {
      const openV = document.getElementById("ag-open").value;
      const closeV = document.getElementById("ag-close").value;
      const payload = {
        class_id: cid, title, description: document.getElementById("ag-desc").value.trim(), type,
        open_time: openV ? new Date(openV).toISOString() : null,
        close_time: closeV ? new Date(closeV).toISOString() : null,
        reference_code: type === "arduino" ? document.getElementById("ag-ref").value : "",
        grading_keywords: type === "arduino" ? document.getElementById("ag-kw").value : "",
        max_score: Number(document.getElementById("ag-max").value) || 10,
        category: document.getElementById("ag-cat").value === "final" ? "final" : "process",
        group_count: Number(document.getElementById("ag-gc").value) || 10,
        variant_count: Number(document.getElementById("ag-vc").value) || 3,
        de_images: type === "random" ? deImages : {},
        draw_count: type === "quiz" ? (Number(document.getElementById("ag-draw").value) || 0) : 0,
        shuffle_options: type === "quiz" ? document.getElementById("ag-shuf-o").checked : false,
        shuffle_questions: type === "quiz" ? document.getElementById("ag-shuf-q").checked : false,
      };
      let asgId = existingId;
      if (isEdit) {
        const { error } = await sb.from("assignments").update(payload).eq("id", existingId);
        if (error) throw error;
        // cập nhật câu hỏi: xoá hết rồi thêm lại theo danh sách hiện tại
        await sb.from("quiz_questions").delete().eq("assignment_id", existingId);
      } else {
        const { data: asg, error } = await sb.from("assignments").insert(payload).select().single();
        if (error) throw error;
        asgId = asg.id;
      }
      if (type === "quiz") {
        const qrows = quiz.map((q, i) => ({ assignment_id: asgId, position: i, question: q.question, option_a: q.option_a, option_b: q.option_b, option_c: q.option_c, option_d: q.option_d, correct_option: q.correct_option, points: Number(q.points) || 1, question_image: q.question_image || "", option_a_image: q.option_a_image || "", option_b_image: q.option_b_image || "", option_c_image: q.option_c_image || "", option_d_image: q.option_d_image || "" }));
        const { error: qe } = await sb.from("quiz_questions").insert(qrows);
        if (qe) throw qe;
      }
      toast(isEdit ? "Đã lưu thay đổi" : "Đã giao bài", "ok"); closeModal(); tabAssignments(cid, true);
    } catch (err) { toast("Lỗi: " + err.message, "err"); e.target.disabled = false; e.target.textContent = isEdit ? "Lưu thay đổi" : "Giao bài"; }
  };
}

    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
      <b>Đề của bạn</b><span style="font-size:28px;font-weight:800;color:var(--blue)">${esc(label)}</span></div>
    <p class="meta">Nhóm ${ans.group} · Phương án ${ans.variant} — ngồi cùng các bạn <b>Nhóm ${ans.group}</b> (dùng chung kit).</p>
    ${img ? `<img src="${esc(img)}" style="max-width:100%;border-radius:10px;margin-top:8px"/>`
          : `<p class="muted">Giáo viên chưa đính kèm ảnh cho ô này — xem đề theo nhãn <b>${esc(label)}</b> trên kit/giấy.</p>`}
    <div id="roster" class="meta" style="margin-top:12px"><span class="loader"></span></div></div>`;

/* ----- Học sinh: làm bài ----- */
async function studentAssignmentDetail(a) {
  const [stx] = asgStatus(a);
  const { data: mySub } = await sb.from("submissions").select("*").eq("assignment_id", a.id).eq("student_id", state.profile.id).maybeSingle();
  const body = modalRoot().querySelector(".modal-body");
  let inner = `<div class="pill-row"><span class="badge blue">${TYPE_LABEL[a.type]}</span><span class="badge gray">${stx}</span></div>
    <h3 style="margin:0 0 4px">${esc(a.title)}</h3>
    <p class="meta">Đóng: ${fmtDT(a.close_time)}</p>
    ${a.description ? `<p style="white-space:pre-wrap">${esc(a.description)}</p>` : ""}<hr style="border:none;border-top:1px solid var(--line)"/>`;

  if (stx === "Chưa mở") { body.innerHTML = inner + `<div class="empty">Bài tập chưa mở.</div>`; return; }
  const closed = stx === "Đã đóng";

  // Bài kiểm tra trên lớp: học sinh không nộp, chỉ xem điểm giáo viên nhập
  if (a.type === "offline") {
    const has = mySub && mySub.score != null;
    inner += `<div class="card" style="margin:0">
      <b>Bài kiểm tra trên lớp</b>
      <p class="muted" style="margin:4px 0 0">Điểm do giáo viên nhập trực tiếp, không cần nộp bài ở đây.</p>
      ${has ? `<p style="margin-top:8px">Điểm: <b>${mySub.score}/${a.max_score}</b></p>` : `<p class="muted" style="margin-top:8px">Chưa có điểm.</p>`}
      ${mySub && mySub.teacher_feedback ? `<div style="margin-top:8px"><b>Nhận xét của giáo viên:</b><p style="white-space:pre-wrap;margin:4px 0 0">${esc(mySub.teacher_feedback)}</p></div>` : ""}
    </div>`;
    body.innerHTML = inner; return;
  }

  // Bốc đề thực hành: học sinh bốc 1 suất ngẫu nhiên, xem ảnh đề + nhóm
  if (a.type === "random") {
    const ans = mySub && mySub.answers && mySub.answers.group ? mySub.answers : null;
    if (ans) { await renderRandomClaim(a, ans, inner, body); return; }
    if (closed) { body.innerHTML = inner + `<div class="empty">Đã đóng — bạn chưa bốc đề.</div>`; return; }
    inner += `<div class="card" style="margin:0"><b>Bốc đề thực hành</b>
      <p class="muted" style="margin:4px 0 10px">Bấm để bốc ngẫu nhiên một đề. Bốc rồi sẽ giữ nguyên (không đổi lại). Các bạn cùng nhóm sẽ ngồi chung kit.</p>
      <button class="btn block" id="claim-de">🎲 Lấy đề</button></div>`;
    body.innerHTML = inner;
    document.getElementById("claim-de").onclick = async (e) => {
      e.target.disabled = true; e.target.textContent = "Đang bốc...";
      const { data, error } = await sb.rpc("claim_random_de", { p_assignment: a.id });
      if (error || !data || !data.ok) {
        toast((data && data.error) || (error && error.message) || "Không bốc được đề", "err");
        e.target.disabled = false; e.target.textContent = "🎲 Lấy đề"; return;
      }
      openAssignmentDetail(a.id, a.class_id, false);
    };
    return;
  }

  // ĐÃ NỘP -> chỉ xem, không cho nộp lại (đến khi giáo viên xoá bài cho làm lại)
  if (mySub) {
    const scoreLine = mySub.score != null
      ? `<p>${mySub.graded ? "Điểm" : "Điểm gợi ý (chờ GV duyệt)"}: <b>${mySub.score}/${a.max_score}</b></p>`
      : `<p class="muted">Chờ giáo viên chấm.</p>`;
    let detail = "";
    if (a.type === "arduino" && mySub.content)
      detail = `<div style="margin-top:8px"><b>Code đã nộp</b> <span class="meta">(dòng lỗi tô đỏ — di chuột để xem lỗi)</span>${codeView(mySub.content)}</div>`;
    else if (a.type === "text" && mySub.content)
      detail = `<div style="margin-top:8px"><b>Bài làm đã nộp:</b><p style="white-space:pre-wrap;margin:4px 0 0">${esc(mySub.content)}</p></div>`;
    else if (a.type === "file" && mySub.file_url)
      detail = `<p style="margin-top:8px"><a class="btn secondary sm" href="${esc(mySub.file_url)}" target="_blank">⬇ Tải file đã nộp</a></p>`;
    inner += `<div class="card" style="margin:0;background:#dcfce7;border-color:#bbf7d0">
      <b style="color:#15803d">✅ Đã nộp</b> <span class="meta">lúc ${fmtDT(mySub.submitted_at)}</span>
      ${scoreLine}
      ${mySub.auto_feedback ? `<p class="meta" style="white-space:pre-wrap">${esc(mySub.auto_feedback)}</p>` : ""}
      ${mySub.teacher_feedback ? `<div style="margin-top:8px"><b>Nhận xét của giáo viên:</b><p style="white-space:pre-wrap;margin:4px 0 0">${esc(mySub.teacher_feedback)}</p></div>` : ""}
      ${detail}
      <p class="meta" style="margin-top:10px">Muốn nộp lại? Hãy liên hệ giáo viên để được mở làm lại.</p></div>`;
    body.innerHTML = inner;
    return;
  }

  // CHƯA NỘP
  if (closed) { body.innerHTML = inner + `<div class="empty">Đã đóng — bạn chưa nộp bài.</div>`; return; }

  if (a.type === "quiz") {
    const { data: qsRaw } = await sb.from("quiz_questions").select("*").eq("assignment_id", a.id).order("position");
    let qsAll = qsRaw || [];
    if (a.shuffle_questions) qsAll = shuffle(qsAll);
    let qs = (a.draw_count && a.draw_count > 0) ? qsAll.slice(0, a.draw_count) : qsAll;
    qs = qs.map((q) => {
      let opts = ["a", "b", "c", "d"].filter((o) => q["option_" + o] || q["option_" + o + "_image"]);
      if (a.shuffle_options) opts = shuffle(opts);
      return Object.assign({}, q, { _opts: opts });
    });
    inner += qs.map((q, i) => `<div class="q-card"><b>Câu ${i + 1}.</b> ${esc(q.question)}
      ${q.question_image ? `<div><img src="${esc(q.question_image)}" style="max-width:100%;max-height:280px;border-radius:8px;margin:8px 0"/></div>` : ""}
      ${q._opts.map((o, idx) => `
        <label class="opt"><input type="radio" name="q-${q.id}" value="${o.toUpperCase()}"/> <b>${String.fromCharCode(65 + idx)}.</b> ${esc(q["option_" + o] || "")}
        ${q["option_" + o + "_image"] ? `<img src="${esc(q["option_" + o + "_image"])}" style="max-height:110px;border-radius:6px;margin-left:6px;vertical-align:middle"/>` : ""}</label>`).join("")}</div>`).join("");
    inner += `<button class="btn block" id="quiz-submit">Nộp bài</button>`;
    body.innerHTML = inner;
    document.getElementById("quiz-submit").onclick = async (e) => {
      const answers = {};
      qs.forEach((q) => { const sel = body.querySelector(`input[name="q-${q.id}"]:checked`); answers[q.id] = sel ? sel.value : ""; });
      let totalPts = 0, correctPts = 0, correctN = 0;
      qs.forEach((q) => { totalPts += Number(q.points) || 0; if (answers[q.id] === q.correct_option) { correctPts += Number(q.points) || 0; correctN++; } });
      const score = totalPts > 0 ? Math.round(correctPts / totalPts * a.max_score * 100) / 100 : 0;
      e.target.disabled = true;
      const { error } = await sb.from("submissions").upsert({
        assignment_id: a.id, student_id: state.profile.id, answers, score, graded: true,
        auto_feedback: `Chấm tự động: đúng ${correctN}/${qs.length} câu.`,
        submitted_at: new Date().toISOString(),
      }, { onConflict: "assignment_id,student_id" });
      if (error) { e.target.disabled = false; return toast("Lỗi: " + error.message, "err"); }
      toast(`Đã nộp — ${score}/${a.max_score} điểm`, "ok"); closeModal();
    };
  } else if (a.type === "arduino") {
    inner += `<div class="field"><label>Dán code Arduino (.ino)</label><textarea id="ar-code" class="code" placeholder="void setup() {\n  ...\n}\nvoid loop() {\n  ...\n}"></textarea></div>
      <button class="btn block" id="ar-submit">Nộp bài</button>`;
    body.innerHTML = inner;
    document.getElementById("ar-submit").onclick = async (e) => {
      const code = document.getElementById("ar-code").value;
      if (!code.trim()) return toast("Dán code trước khi nộp", "err");
      const r = gradeArduino(code, a.grading_keywords, a.max_score);
      e.target.disabled = true;
      const { error } = await sb.from("submissions").upsert({
        assignment_id: a.id, student_id: state.profile.id, content: code,
        score: r.score, graded: false, auto_feedback: r.feedback, submitted_at: new Date().toISOString(),
      }, { onConflict: "assignment_id,student_id" });
      if (error) { e.target.disabled = false; return toast("Lỗi: " + error.message, "err"); }
      toast("Đã nộp bài", "ok"); closeModal();
    };
  } else if (a.type === "file") {
    inner += `<div class="field"><label>Tải file nộp</label><input id="fl-file" type="file" /></div>
      <button class="btn block" id="fl-submit">Nộp bài</button>`;
    body.innerHTML = inner;
    document.getElementById("fl-submit").onclick = async (e) => {
      const f = document.getElementById("fl-file").files[0];
      if (!f) return toast("Chọn file", "err");
      e.target.disabled = true; e.target.textContent = "Đang tải...";
      try {
        const url = await uploadFile(f, "submissions");
        const { error } = await sb.from("submissions").upsert({
          assignment_id: a.id, student_id: state.profile.id, file_url: url, graded: false, submitted_at: new Date().toISOString(),
        }, { onConflict: "assignment_id,student_id" });
        if (error) throw error;
        toast("Đã nộp bài", "ok"); closeModal();
      } catch (err) { toast("Lỗi: " + err.message, "err"); e.target.disabled = false; e.target.textContent = "Nộp bài"; }
    };
  } else { // text
    inner += `<div class="field"><label>Bài làm</label><textarea id="tx-content" style="min-height:160px"></textarea></div>
      <button class="btn block" id="tx-submit">Nộp bài</button>`;
    body.innerHTML = inner;
    document.getElementById("tx-submit").onclick = async (e) => {
      const c = document.getElementById("tx-content").value;
      if (!c.trim()) return toast("Nhập bài làm trước khi nộp", "err");
      e.target.disabled = true;
      const { error } = await sb.from("submissions").upsert({
        assignment_id: a.id, student_id: state.profile.id, content: c, graded: false, submitted_at: new Date().toISOString(),
      }, { onConflict: "assignment_id,student_id" });
      if (error) { e.target.disabled = false; return toast("Lỗi: " + error.message, "err"); }
      toast("Đã nộp bài", "ok"); closeModal();
    };
  }
}

/* Chấm tự động Arduino — dựa trên cấu trúc & từ khoá (heuristic, không biên dịch thật) */
/* Kiểm tra lỗi cấu trúc code Arduino (tĩnh, không biên dịch thật). Trả về danh sách lỗi kèm số dòng. */
function lintArduino(raw) {
  const errors = [];
  const code = raw || "";
  if (!code.trim()) { errors.push({ line: 1, msg: "Code trống" }); return { errors }; }
  const lines = code.split(/\r?\n/);
  let inBlock = false, braceBal = 0, parenBal = 0, negBrace = 0, negParen = 0;
  const clean = [];
  lines.forEach((s, idx) => {
    const lineNo = idx + 1;
    let cleaned = "";
    for (let i = 0; i < s.length; i++) {
      if (inBlock) { if (s[i] === "*" && s[i + 1] === "/") { inBlock = false; i++; } continue; }
      if (s[i] === "/" && s[i + 1] === "*") { inBlock = true; i++; continue; }
      if (s[i] === "/" && s[i + 1] === "/") break;
      cleaned += s[i];
    }
    let noStr = "", inStr = false, strCh = "", esc = false;
    for (let i = 0; i < cleaned.length; i++) {
      const c = cleaned[i];
      if (inStr) { if (esc) { esc = false; continue; } if (c === "\\") { esc = true; continue; } if (c === strCh) inStr = false; continue; }
      if (c === '"' || c === "'") { inStr = true; strCh = c; continue; }
      noStr += c;
    }
    if (inStr) errors.push({ line: lineNo, msg: "Chuỗi/ký tự chưa đóng dấu nháy" });
    for (const c of noStr) {
      if (c === "{") braceBal++;
      else if (c === "}") { braceBal--; if (braceBal < 0 && !negBrace) negBrace = lineNo; }
      else if (c === "(") parenBal++;
      else if (c === ")") { parenBal--; if (parenBal < 0 && !negParen) negParen = lineNo; }
    }
    clean.push(noStr.trim());
  });
  if (inBlock) errors.push({ line: lines.length, msg: "Comment /* */ chưa đóng" });
  if (negBrace) errors.push({ line: negBrace, msg: "Thừa dấu } (đóng ngoặc nhọn dư)" });
  else if (braceBal > 0) errors.push({ line: lines.length, msg: `Thiếu ${braceBal} dấu } (chưa đóng ngoặc nhọn)` });
  if (negParen) errors.push({ line: negParen, msg: "Thừa dấu )" });
  else if (parenBal > 0) errors.push({ line: lines.length, msg: `Thiếu ${parenBal} dấu )` });
  const lc = code.toLowerCase();
  if (!/void\s+setup\s*\(/.test(lc)) errors.push({ line: 1, msg: "Thiếu hàm void setup()" });
  if (!/void\s+loop\s*\(/.test(lc)) errors.push({ line: 1, msg: "Thiếu hàm void loop()" });
  // Kiểm tra THIẾU DẤU ; (thận trọng để tránh báo nhầm)
  const skipEnd = /[;{},(\[:\\+\-*/%=<>&|^!?.~]$/; // dòng kết thúc kiểu này thì bỏ qua
  const ctrlHead = /^(if|for|while|switch|else|do)\b/; // header điều khiển: không cần ;
  let semiCount = 0;
  for (let i = 0; i < clean.length && semiCount < 8; i++) {
    const t = clean[i];
    if (!t || t[0] === "#") continue;
    if (skipEnd.test(t)) continue;
    if (ctrlHead.test(t)) continue;
    let nxt = "";
    for (let j = i + 1; j < clean.length; j++) { if (clean[j]) { nxt = clean[j]; break; } }
    const isAssign = t.includes("=") && !/==|<=|>=|!=/.test(t);
    const isReturnLike = /^(return|break|continue)\b/.test(t);
    if (t.endsWith(")")) {
      if (nxt.startsWith("{") || nxt.startsWith(".")) continue; // định nghĩa hàm / control { dòng sau / nối chuỗi
      errors.push({ line: i + 1, msg: "Thiếu dấu ; cuối câu lệnh" }); semiCount++;
    } else if (isAssign || isReturnLike) {
      errors.push({ line: i + 1, msg: "Thiếu dấu ; cuối câu lệnh" }); semiCount++;
    }
  }
  // sắp xếp lỗi theo số dòng cho dễ đọc
  errors.sort((x, y) => x.line - y.line);
  return { errors };
}
/* HTML hiển thị code, dòng lỗi tô đỏ + di chuột xem lỗi (title) */
function codeView(code) {
  const { errors } = lintArduino(code || "");
  const errMap = {};
  errors.forEach((e) => { (errMap[e.line] = errMap[e.line] || []).push(e.msg); });
  const lines = (code || "").split(/\r?\n/);
  const rows = lines.map((ln, i) => {
    const no = i + 1, bad = errMap[no];
    return `<div class="codeline${bad ? " bad" : ""}"${bad ? ` title="${esc(bad.join("; "))}"` : ""}>` +
      `<span class="ln">${no}</span><span class="lt">${esc(ln) || " "}</span></div>`;
  }).join("");
  return `<div class="codeblock">${rows}</div>`;
}
/* Chấm Arduino: có lỗi -> 0đ + nêu lỗi; không lỗi -> điểm gợi ý theo từ khoá (chờ GV duyệt) */
function gradeArduino(code, keywordsStr, maxScore) {
  const { errors } = lintArduino(code);
  if (errors.length) {
    const fb = "❌ Phát hiện lỗi trong code — đề nghị 0 điểm:\n" +
      errors.map((e) => `• Dòng ${e.line}: ${e.msg}`).join("\n");
    return { score: 0, feedback: fb, hasError: true };
  }
  const c = (code || "").toLowerCase();
  const kws = (keywordsStr || "").split(",").map((s) => s.trim()).filter(Boolean);
  const fb = ["✓ Không phát hiện lỗi cấu trúc rõ ràng (chưa biên dịch thật)."];
  let kwScore = 1;
  if (kws.length) {
    const found = kws.filter((k) => c.includes(k.toLowerCase()));
    const missing = kws.filter((k) => !c.includes(k.toLowerCase()));
    kwScore = found.length / kws.length;
    fb.push(`Từ khoá yêu cầu: đạt ${found.length}/${kws.length}.` + (missing.length ? ` Thiếu: ${missing.join(", ")}.` : ""));
  } else fb.push("Chưa khai từ khoá chấm — chỉ ước lượng theo cấu trúc.");
  const score = Math.round(kwScore * maxScore * 100) / 100;
  fb.push(`→ Điểm gợi ý: ${score}/${maxScore} (chờ giáo viên duyệt).`);
  return { score, feedback: fb.join("\n"), hasError: false };
}

/* ----- Giáo viên: xem & chấm bài nộp ----- */
async function teacherAssignmentDetail(a) {
  const body = modalRoot().querySelector(".modal-body");
  // Bài bốc đề: hiển thị danh sách nhóm + nút xáo lại
  if (a.type === "random") {
    body.innerHTML = `<div class="pill-row"><span class="badge blue">Bốc đề thực hành</span>
      <span class="badge gray">${a.group_count || 10} nhóm × ${a.variant_count || 3} phương án</span></div>
      <h3 style="margin:0 0 4px">${esc(a.title)}</h3>
      ${a.description ? `<p class="muted" style="white-space:pre-wrap">${esc(a.description)}</p>` : ""}
      <div id="rost">${loadingHTML()}</div>
      <button class="btn danger sm" id="reset-draw" style="margin-top:10px">Xoá toàn bộ lượt bốc (xáo lại)</button>`;
    const { data: roster } = await sb.rpc("random_de_roster", { p_assignment: a.id });
    const byGroup = {};
    (roster || []).forEach((r) => { (byGroup[r.grp] = byGroup[r.grp] || []).push(r); });
    const groups = Object.keys(byGroup).map(Number).sort((x, y) => x - y);
    document.getElementById("rost").innerHTML = groups.length
      ? `<p class="meta">${(roster || []).length} học sinh đã bốc đề.</p>` + groups.map((g) =>
        `<div class="card" style="margin:8px 0;padding:10px"><b>Nhóm ${g}</b> <span class="meta">(ngồi chung kit)</span><br>
          ${byGroup[g].map((r) => `${esc(r.full_name)} — <b>Đề ${esc(r.label)}</b>`).join("<br>")}</div>`).join("")
      : `<div class="empty">Chưa có học sinh nào bốc đề.</div>`;
    document.getElementById("reset-draw").onclick = async () => {
      if (!confirm("Xoá toàn bộ lượt bốc đề của bài này? Mọi học sinh sẽ bốc lại từ đầu (dùng để xáo nhóm buổi mới).")) return;
      const { error } = await sb.from("submissions").delete().eq("assignment_id", a.id);
      if (error) return toast("Lỗi: " + error.message, "err");
      toast("Đã xoá — học sinh có thể bốc lại", "ok"); teacherAssignmentDetail(a);
    };
    return;
  }
  const [{ data: members }, { data: subs }] = await Promise.all([
    sb.from("class_members").select("student:student_id(id,full_name)").eq("class_id", a.class_id),
    sb.from("submissions").select("*, student:student_id(full_name)").eq("assignment_id", a.id),
  ]);
  const subMap = {}; (subs || []).forEach((s) => subMap[s.student_id] = s);
  const rows = (members || []).map((m) => {
    const st = m.student; const s = subMap[st.id];
    if (!s) return `<tr><td>${esc(st.full_name)}</td><td><span class="badge gray">Chưa nộp</span></td><td></td></tr>`;
    const scoreCell = s.score != null ? `<b>${s.score}/${a.max_score}</b>` : "—";
    const stBadge = s.graded ? `<span class="badge green">đã chấm</span>` : `<span class="badge amber">chờ chấm</span>`;
    return `<tr>
      <td>${esc(st.full_name)}<div class="meta">${fmtDT(s.submitted_at)}</div></td>
      <td>${scoreCell} ${stBadge}</td>
      <td style="white-space:nowrap">
        <button class="btn sm" data-grade="${st.id}">Chấm</button>
        <button class="btn danger sm" data-resub="${s.id}" data-name="${esc(st.full_name)}">Xoá để làm lại</button>
      </td>
    </tr>`;
  }).join("");
  body.innerHTML = `
    <div class="pill-row"><span class="badge blue">${TYPE_LABEL[a.type]}</span><span class="badge gray">Tối đa ${a.max_score}đ</span>
      <button class="btn secondary sm" id="exp-one">⬇ Tải điểm (CSV)</button></div>
    <h3 style="margin:0 0 4px">${esc(a.title)}</h3>
    ${a.description ? `<p class="muted" style="white-space:pre-wrap">${esc(a.description)}</p>` : ""}
    <div class="table-wrap"><table><thead><tr><th>Học sinh</th><th>Điểm</th><th>Thao tác</th></tr></thead>
    <tbody>${rows || `<tr><td colspan="3" class="empty">Lớp chưa có học sinh.</td></tr>`}</tbody></table></div>`;
  document.getElementById("exp-one").onclick = () => {
    const r = [["Học sinh", "Trạng thái", "Thời gian nộp", `Điểm (/${a.max_score})`, "Nhận xét"]];
    (members || []).forEach((m) => {
      const s = subMap[m.student.id];
      r.push([m.student.full_name, s ? "Đã nộp" : "Chưa nộp", s ? fmtDT(s.submitted_at) : "", s && s.score != null ? s.score : "", s ? (s.teacher_feedback || "") : ""]);
    });
    downloadCSV(`diem-${(a.title || "bai").replace(/\s+/g, "_")}.csv`, r);
  };
  on("[data-grade]", "click", (e) => {
    const s = subMap[e.currentTarget.dataset.grade];
    openGradeModal(s, a);
  }, body);
  on("[data-resub]", "click", async (e) => {
    const name = e.currentTarget.dataset.name;
    if (!confirm(`Xoá bài nộp của "${name}" để cho làm lại?\nĐiểm & nội dung đã nộp của bài này sẽ bị xoá.`)) return;
    const { error } = await sb.from("submissions").delete().eq("id", e.currentTarget.dataset.resub);
    if (error) return toast("Lỗi: " + error.message, "err");
    toast("Đã xoá — học sinh có thể làm lại", "ok");
    teacherAssignmentDetail(a);
  }, body);
}

/* Modal chấm chi tiết: xem bài (code tô lỗi) + điểm + nhận xét */
function openGradeModal(s, a) {
  const name = s.student?.full_name || "";
  let view = "";
  if (a.type === "arduino") view = `<label>Code đã nộp <span class="meta">(dòng lỗi tô đỏ — di chuột để xem lỗi)</span></label>${codeView(s.content)}`;
  else if (a.type === "text") view = `<label>Bài làm</label><div class="codeblock" style="padding:8px;white-space:pre-wrap">${esc(s.content) || "(trống)"}</div>`;
  else if (a.type === "file") view = s.file_url ? `<a class="btn secondary sm" href="${esc(s.file_url)}" target="_blank">⬇ Tải file bài nộp</a>` : `<p class="muted">Không có file.</p>`;
  else if (a.type === "quiz") view = `<p class="muted">Bài trắc nghiệm đã chấm tự động.</p>`;
  const autoFb = s.auto_feedback ? `<div class="card" style="margin:10px 0 0;background:var(--surface-2)"><b>Máy chấm:</b><div class="meta" style="white-space:pre-wrap;margin-top:4px">${esc(s.auto_feedback)}</div></div>` : "";
  showModal("Chấm bài — " + esc(name), `
    ${view}
    ${autoFb}
    <div class="field" style="max-width:160px;margin-top:14px"><label>Điểm (/${a.max_score})</label><input id="gd-score" type="number" value="${s.score ?? ""}" /></div>
    <div class="field"><label>Nhận xét cho học sinh</label>
      <textarea id="gd-fb" style="min-height:90px" placeholder="VD: Dòng 8 dùng delay(2000) sai yêu cầu (đề cần 100ms).">${esc(s.teacher_feedback || "")}</textarea></div>`,
    `<button class="btn secondary" id="gd-cancel">Đóng</button><button class="btn" id="gd-save">Lưu điểm & nhận xét</button>`, "lg");
  document.getElementById("gd-cancel").onclick = () => openAssignmentDetail(a.id, a.class_id, true);
  document.getElementById("gd-save").onclick = async (e) => {
    const val = document.getElementById("gd-score").value;
    const fb = document.getElementById("gd-fb").value;
    e.target.disabled = true;
    const { error } = await sb.from("submissions").update({
      score: val === "" ? null : Number(val), teacher_feedback: fb, graded: true,
    }).eq("id", s.id);
    if (error) { toast("Lỗi: " + error.message, "err"); e.target.disabled = false; return; }
    toast("Đã lưu điểm & nhận xét", "ok");
    openAssignmentDetail(a.id, a.class_id, true);
  };
}

/* ---- 9.4 Điểm danh (GV) ---- */
async function tabAttendance(cid) {
  const today = new Date().toISOString().slice(0, 10);
  tabc().innerHTML = `<div class="card">
    <div class="row" style="align-items:flex-end">
      <div class="field"><label>Ngày điểm danh</label><input id="att-date" type="date" value="${today}"/></div>
      <button class="btn" id="att-load">Tải danh sách</button>
    </div>
    <div id="att-body">${loadingHTML()}</div>
  </div>`;
  document.getElementById("att-load").onclick = () => loadAttendance(cid, document.getElementById("att-date").value);
  loadAttendance(cid, today);
}
async function loadAttendance(cid, date) {
  const wrap = document.getElementById("att-body");
  wrap.innerHTML = loadingHTML();
  const [{ data: members }, { data: existing }] = await Promise.all([
    sb.from("class_members").select("student:student_id(id,full_name)").eq("class_id", cid),
    sb.from("attendance").select("*").eq("class_id", cid).eq("session_date", date),
  ]);
  const exMap = {}; (existing || []).forEach((a) => exMap[a.student_id] = a);
  const taken = (existing || []).length > 0;
  const lastTime = taken ? existing.reduce((m, a) => a.created_at > m ? a.created_at : m, existing[0].created_at) : null;
  const LBL = { present: "Có mặt", late: "Đi trễ", absent: "Vắng", excused: "Vắng phép" };
  const opts = (cur) => ["present", "late", "absent", "excused"].map((s) =>
    `<option value="${s}" ${cur === s ? "selected" : ""}>${LBL[s]}</option>`).join("");
  const rows = (members || []).map((m) => {
    const st = m.student; const saved = exMap[st.id]; const cur = saved?.status || "present";
    return `<tr><td>${esc(st.full_name)}</td>
      <td><select data-att="${st.id}">${opts(cur)}</select></td>
      <td>${saved ? `<span class="badge green">✓ đã ghi</span>` : `<span class="badge gray">chưa ghi</span>`}</td></tr>`;
  }).join("");
  const banner = taken
    ? `<div class="card" style="margin:0 0 12px;background:#dcfce7;border-color:#bbf7d0">
        <b style="color:#15803d">✅ Đã điểm danh ngày ${fmtDate(date)}</b>
        <div class="meta">${(existing || []).length} học sinh • lần lưu gần nhất: ${fmtDT(lastTime)}. Có thể chỉnh lại rồi lưu để cập nhật.</div></div>`
    : `<div class="card" style="margin:0 0 12px;background:#fef0d6;border-color:#fde3a7">
        <b style="color:#92590a">⚠️ Chưa điểm danh ngày ${fmtDate(date)}</b>
        <div class="meta">Chọn trạng thái cho từng học sinh rồi bấm "Lưu điểm danh".</div></div>`;
  wrap.innerHTML = banner +
    `<div class="table-wrap"><table><thead><tr><th>Học sinh</th><th>Trạng thái</th><th>Ghi nhận</th></tr></thead>
    <tbody>${rows || `<tr><td colspan="3" class="empty">Lớp chưa có học sinh.</td></tr>`}</tbody></table></div>
    <button class="btn" id="att-save" style="margin-top:12px">${taken ? "Cập nhật điểm danh" : "Lưu điểm danh"} ${fmtDate(date)}</button>`;
  const saveBtn = document.getElementById("att-save");
  if (saveBtn) saveBtn.onclick = async (e) => {
    if (!(members || []).length) return;
    e.target.disabled = true; e.target.textContent = "Đang lưu...";
    const now = new Date().toISOString();
    const records = (members || []).map((m) => ({
      class_id: cid, student_id: m.student.id, session_date: date,
      status: wrap.querySelector(`[data-att="${m.student.id}"]`).value, created_at: now,
    }));
    const { error } = await sb.from("attendance").upsert(records, { onConflict: "class_id,student_id,session_date" });
    if (error) { toast("Lỗi: " + error.message, "err"); e.target.disabled = false; return; }
    toast(`Đã lưu điểm danh ${fmtDate(date)} lúc ${new Date().toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" })}`, "ok");
    loadAttendance(cid, date); // tải lại để hiện dấu hiệu đã điểm danh
  };
}

/* ---- 9.5 Đơn xin phép (GV duyệt) ---- */
async function tabAbsenceReview(cid) {
  const { data } = await sb.from("absence_requests").select("*, student:student_id(full_name)").eq("class_id", cid).order("created_at", { ascending: false });
  const stt = { pending: ["Chờ duyệt", "amber"], approved: ["Đã duyệt", "green"], rejected: ["Từ chối", "red"] };
  const rows = (data || []).map((r) => `
    <tr><td>${esc(r.student?.full_name || "")}<div class="meta">${fmtDate(r.absence_date)}</div></td>
      <td class="meta">${esc(r.reason || "")}</td>
      <td><span class="badge ${stt[r.status][1]}">${stt[r.status][0]}</span></td>
      <td>${r.status === "pending" ? `<button class="btn success sm" data-app="${r.id}" data-sid="${r.student_id}" data-date="${r.absence_date}">Duyệt</button>
        <button class="btn danger sm" data-rej="${r.id}">Từ chối</button>` : ""}</td></tr>`).join("");
  tabc().innerHTML = `<div class="card"><h3>Đơn xin phép vắng</h3>
    <p class="muted" style="margin-top:-6px">Duyệt đơn sẽ tự động ghi "Vắng phép" vào bảng điểm danh ngày đó.</p>
    <div class="table-wrap"><table><thead><tr><th>Học sinh / ngày</th><th>Lý do</th><th>Trạng thái</th><th></th></tr></thead>
    <tbody>${rows || `<tr><td colspan="4" class="empty">Chưa có đơn.</td></tr>`}</tbody></table></div></div>`;
  on("[data-app]", "click", async (e) => {
    const id = e.currentTarget.dataset.app;
    const sid = e.currentTarget.dataset.sid;
    const date = e.currentTarget.dataset.date;
    const { error } = await sb.from("absence_requests").update({ status: "approved" }).eq("id", id);
    if (error) return toast("Lỗi duyệt đơn: " + error.message, "err");
    const { error: ae } = await sb.from("attendance").upsert({ class_id: cid, student_id: sid, session_date: date, status: "excused", note: "Duyệt từ đơn xin phép" }, { onConflict: "class_id,student_id,session_date" });
    if (ae) toast("Đã duyệt, nhưng cập nhật điểm danh lỗi: " + ae.message, "err");
    else toast("Đã duyệt & cập nhật điểm danh", "ok");
    tabAbsenceReview(cid);
  }, tabc());
  on("[data-rej]", "click", async (e) => {
    const { error } = await sb.from("absence_requests").update({ status: "rejected" }).eq("id", e.currentTarget.dataset.rej);
    if (error) return toast("Lỗi: " + error.message, "err");
    toast("Đã từ chối", "ok"); tabAbsenceReview(cid);
  }, tabc());
}
