<!--
================================================================================
 SCHEMA SUPABASE — chạy 1 lần trong: Supabase Dashboard > SQL Editor > New query
 (Toàn bộ CSDL + bảo mật đều nằm ngay trong file này để bạn dễ copy.)
================================================================================
-- ============================================================================
--  EduHub - Supabase schema (ĐÃ SỬA thứ tự: tạo BẢNG trước, HÀM sau)
--  Chạy toàn bộ file này trong: Supabase Dashboard > SQL Editor > New query > Run
--  Chạy lại nhiều lần được (idempotent).
-- ============================================================================

-- ---------------------------------------------------------------------------
-- 1. TẠO TẤT CẢ CÁC BẢNG TRƯỚC
-- ---------------------------------------------------------------------------
create table if not exists public.profiles (
  id          uuid primary key references auth.users(id) on delete cascade,
  full_name   text not null default '',
  email       text not null default '',
  role        text not null default 'student' check (role in ('admin','teacher','student')),
  created_at  timestamptz not null default now()
);

create table if not exists public.classes (
  id          uuid primary key default gen_random_uuid(),
  name        text not null,
  description text default '',
  teacher_id  uuid references public.profiles(id) on delete set null,
  created_at  timestamptz not null default now()
);

create table if not exists public.class_members (
  id         uuid primary key default gen_random_uuid(),
  class_id   uuid not null references public.classes(id) on delete cascade,
  student_id uuid not null references public.profiles(id) on delete cascade,
  created_at timestamptz not null default now(),
  unique (class_id, student_id)
);

create table if not exists public.announcements (
  id         uuid primary key default gen_random_uuid(),
  class_id   uuid not null references public.classes(id) on delete cascade,
  author_id  uuid references public.profiles(id) on delete set null,
  type       text not null default 'text' check (type in ('text','image','video')),
  title      text default '',
  content    text default '',
  media_url  text default '',
  created_at timestamptz not null default now()
);

create table if not exists public.materials (
  id          uuid primary key default gen_random_uuid(),
  class_id    uuid not null references public.classes(id) on delete cascade,
  title       text not null,
  url         text not null,
  description text default '',
  created_at  timestamptz not null default now()
);

create table if not exists public.assignments (
  id               uuid primary key default gen_random_uuid(),
  class_id         uuid not null references public.classes(id) on delete cascade,
  title            text not null,
  description      text default '',
  type             text not null default 'text' check (type in ('arduino','quiz','file','text')),
  open_time        timestamptz,
  close_time       timestamptz,
  reference_code   text default '',
  grading_keywords text default '',
  max_score        numeric not null default 10,
  created_at       timestamptz not null default now()
);

create table if not exists public.quiz_questions (
  id            uuid primary key default gen_random_uuid(),
  assignment_id uuid not null references public.assignments(id) on delete cascade,
  position      int not null default 0,
  question      text not null,
  option_a      text default '',
  option_b      text default '',
  option_c      text default '',
  option_d      text default '',
  correct_option text not null default 'A' check (correct_option in ('A','B','C','D')),
  points        numeric not null default 1
);

create table if not exists public.submissions (
  id            uuid primary key default gen_random_uuid(),
  assignment_id uuid not null references public.assignments(id) on delete cascade,
  student_id    uuid not null references public.profiles(id) on delete cascade,
  content       text default '',
  file_url      text default '',
  answers       jsonb default '{}'::jsonb,
  score         numeric,
  auto_feedback text default '',
  graded        boolean not null default false,
  submitted_at  timestamptz not null default now(),
  unique (assignment_id, student_id)
);

create table if not exists public.attendance (
  id           uuid primary key default gen_random_uuid(),
  class_id     uuid not null references public.classes(id) on delete cascade,
  student_id   uuid not null references public.profiles(id) on delete cascade,
  session_date date not null default current_date,
  status       text not null default 'present' check (status in ('present','absent','late','excused')),
  note         text default '',
  created_at   timestamptz not null default now(),
  unique (class_id, student_id, session_date)
);

create table if not exists public.absence_requests (
  id           uuid primary key default gen_random_uuid(),
  student_id   uuid not null references public.profiles(id) on delete cascade,
  class_id     uuid references public.classes(id) on delete set null,
  absence_date date not null default current_date,
  reason       text default '',
  status       text not null default 'pending' check (status in ('pending','approved','rejected')),
  created_at   timestamptz not null default now()
);

create table if not exists public.course_registrations (
  id          uuid primary key default gen_random_uuid(),
  full_name   text not null,
  email       text default '',
  phone       text default '',
  course_name text default '',
  note        text default '',
  status      text not null default 'new' check (status in ('new','contacted','enrolled','rejected')),
  created_at  timestamptz not null default now()
);

-- ---------------------------------------------------------------------------
-- 2. HÀM HỖ TRỢ (tạo SAU khi đã có bảng) - SECURITY DEFINER, tránh đệ quy RLS
-- ---------------------------------------------------------------------------
create or replace function public.auth_role()
returns text language sql stable security definer set search_path = public as $$
  select role from public.profiles where id = auth.uid();
$$;

create or replace function public.is_admin()
returns boolean language sql stable security definer set search_path = public as $$
  select coalesce((select role = 'admin' from public.profiles where id = auth.uid()), false);
$$;

create or replace function public.is_class_teacher(cid uuid)
returns boolean language sql stable security definer set search_path = public as $$
  select exists (select 1 from public.classes c where c.id = cid and c.teacher_id = auth.uid());
$$;

create or replace function public.is_class_member(cid uuid)
returns boolean language sql stable security definer set search_path = public as $$
  select exists (
    select 1 from public.class_members m where m.class_id = cid and m.student_id = auth.uid()
  ) or public.is_class_teacher(cid) or public.is_admin();
$$;

-- ---------------------------------------------------------------------------
-- 3. TRIGGER: tự tạo profile khi có user mới
-- ---------------------------------------------------------------------------
create or replace function public.handle_new_user()
returns trigger language plpgsql security definer set search_path = public as $$
begin
  insert into public.profiles (id, full_name, email, role)
  values (
    new.id,
    coalesce(new.raw_user_meta_data->>'full_name',''),
    coalesce(new.email,''),
    coalesce(new.raw_user_meta_data->>'role','student')
  )
  on conflict (id) do nothing;
  return new;
end;
$$;

drop trigger if exists on_auth_user_created on auth.users;
create trigger on_auth_user_created
  after insert on auth.users
  for each row execute function public.handle_new_user();

-- ---------------------------------------------------------------------------
-- 3b. TẠO HỒ SƠ CHO CÁC USER ĐÃ TỒN TẠI TỪ TRƯỚC (backfill)
--     (Trigger chỉ chạy cho user mới, nên cần dòng này cho user tạo trước đó.)
-- ---------------------------------------------------------------------------
insert into public.profiles (id, full_name, email, role)
select u.id,
       coalesce(u.raw_user_meta_data->>'full_name',''),
       coalesce(u.email,''),
       coalesce(u.raw_user_meta_data->>'role','student')
from auth.users u
where not exists (select 1 from public.profiles p where p.id = u.id)
on conflict (id) do nothing;

-- ---------------------------------------------------------------------------
-- 4. BẬT RLS
-- ---------------------------------------------------------------------------
alter table public.profiles            enable row level security;
alter table public.classes             enable row level security;
alter table public.class_members       enable row level security;
alter table public.announcements       enable row level security;
alter table public.materials           enable row level security;
alter table public.assignments         enable row level security;
alter table public.quiz_questions      enable row level security;
alter table public.submissions         enable row level security;
alter table public.attendance          enable row level security;
alter table public.absence_requests    enable row level security;
alter table public.course_registrations enable row level security;

-- ---------------------------------------------------------------------------
-- 5. POLICIES
-- ---------------------------------------------------------------------------
-- PROFILES: mọi user đã đăng nhập đọc được (để hiện tên GV/HS); anon thì không.
drop policy if exists profiles_read on public.profiles;
create policy profiles_read on public.profiles for select
  to authenticated using (true);

drop policy if exists profiles_self_update on public.profiles;
create policy profiles_self_update on public.profiles for update
  using (auth.uid() = id or public.is_admin())
  with check (auth.uid() = id or public.is_admin());

drop policy if exists profiles_admin_insert on public.profiles;
create policy profiles_admin_insert on public.profiles for insert
  with check (public.is_admin() or auth.uid() = id);

drop policy if exists profiles_admin_delete on public.profiles;
create policy profiles_admin_delete on public.profiles for delete
  using (public.is_admin());

-- CLASSES
drop policy if exists classes_read on public.classes;
create policy classes_read on public.classes for select
  using (public.is_admin() or teacher_id = auth.uid() or public.is_class_member(id));
drop policy if exists classes_admin_write on public.classes;
create policy classes_admin_write on public.classes for all
  using (public.is_admin()) with check (public.is_admin());

-- CLASS_MEMBERS
drop policy if exists members_read on public.class_members;
create policy members_read on public.class_members for select
  using (public.is_admin() or student_id = auth.uid() or public.is_class_teacher(class_id));
drop policy if exists members_admin_write on public.class_members;
create policy members_admin_write on public.class_members for all
  using (public.is_admin()) with check (public.is_admin());

-- ANNOUNCEMENTS
drop policy if exists ann_read on public.announcements;
create policy ann_read on public.announcements for select
  using (public.is_class_member(class_id));
drop policy if exists ann_write on public.announcements;
create policy ann_write on public.announcements for all
  using (public.is_admin() or public.is_class_teacher(class_id))
  with check (public.is_admin() or public.is_class_teacher(class_id));

-- MATERIALS
drop policy if exists mat_read on public.materials;
create policy mat_read on public.materials for select
  using (public.is_class_member(class_id));
drop policy if exists mat_write on public.materials;
create policy mat_write on public.materials for all
  using (public.is_admin() or public.is_class_teacher(class_id))
  with check (public.is_admin() or public.is_class_teacher(class_id));

-- ASSIGNMENTS
drop policy if exists asg_read on public.assignments;
create policy asg_read on public.assignments for select
  using (public.is_class_member(class_id));
drop policy if exists asg_write on public.assignments;
create policy asg_write on public.assignments for all
  using (public.is_admin() or public.is_class_teacher(class_id))
  with check (public.is_admin() or public.is_class_teacher(class_id));

-- QUIZ_QUESTIONS
drop policy if exists quiz_read on public.quiz_questions;
create policy quiz_read on public.quiz_questions for select
  using (exists (select 1 from public.assignments a where a.id = assignment_id and public.is_class_member(a.class_id)));
drop policy if exists quiz_write on public.quiz_questions;
create policy quiz_write on public.quiz_questions for all
  using (exists (select 1 from public.assignments a where a.id = assignment_id and (public.is_admin() or public.is_class_teacher(a.class_id))))
  with check (exists (select 1 from public.assignments a where a.id = assignment_id and (public.is_admin() or public.is_class_teacher(a.class_id))));

-- SUBMISSIONS
drop policy if exists sub_student_read on public.submissions;
create policy sub_student_read on public.submissions for select
  using (student_id = auth.uid() or public.is_admin()
    or exists (select 1 from public.assignments a where a.id = assignment_id and public.is_class_teacher(a.class_id)));
drop policy if exists sub_student_insert on public.submissions;
create policy sub_student_insert on public.submissions for insert
  with check (student_id = auth.uid());
drop policy if exists sub_student_update on public.submissions;
create policy sub_student_update on public.submissions for update
  using (student_id = auth.uid() or public.is_admin()
    or exists (select 1 from public.assignments a where a.id = assignment_id and public.is_class_teacher(a.class_id)))
  with check (student_id = auth.uid() or public.is_admin()
    or exists (select 1 from public.assignments a where a.id = assignment_id and public.is_class_teacher(a.class_id)));

-- ATTENDANCE
drop policy if exists att_read on public.attendance;
create policy att_read on public.attendance for select
  using (student_id = auth.uid() or public.is_admin() or public.is_class_teacher(class_id));
drop policy if exists att_write on public.attendance;
create policy att_write on public.attendance for all
  using (public.is_admin() or public.is_class_teacher(class_id))
  with check (public.is_admin() or public.is_class_teacher(class_id));

-- ABSENCE_REQUESTS
drop policy if exists abs_read on public.absence_requests;
create policy abs_read on public.absence_requests for select
  using (student_id = auth.uid() or public.is_admin() or (class_id is not null and public.is_class_teacher(class_id)));
drop policy if exists abs_student_insert on public.absence_requests;
create policy abs_student_insert on public.absence_requests for insert
  with check (student_id = auth.uid());
drop policy if exists abs_review on public.absence_requests;
create policy abs_review on public.absence_requests for update
  using (public.is_admin() or (class_id is not null and public.is_class_teacher(class_id)))
  with check (public.is_admin() or (class_id is not null and public.is_class_teacher(class_id)));

-- COURSE_REGISTRATIONS (ai cũng gửi được; chỉ admin xem/sửa)
drop policy if exists reg_public_insert on public.course_registrations;
create policy reg_public_insert on public.course_registrations for insert
  to anon, authenticated with check (true);
drop policy if exists reg_admin_read on public.course_registrations;
create policy reg_admin_read on public.course_registrations for select
  using (public.is_admin());
drop policy if exists reg_admin_update on public.course_registrations;
create policy reg_admin_update on public.course_registrations for update
  using (public.is_admin()) with check (public.is_admin());
drop policy if exists reg_admin_delete on public.course_registrations;
create policy reg_admin_delete on public.course_registrations for delete
  using (public.is_admin());

-- ---------------------------------------------------------------------------
-- 6. STORAGE: bucket "uploads"
-- ---------------------------------------------------------------------------
insert into storage.buckets (id, name, public)
values ('uploads', 'uploads', true)
on conflict (id) do nothing;

drop policy if exists uploads_read on storage.objects;
create policy uploads_read on storage.objects for select using (bucket_id = 'uploads');
drop policy if exists uploads_write on storage.objects;
create policy uploads_write on storage.objects for insert to authenticated with check (bucket_id = 'uploads');
drop policy if exists uploads_update on storage.objects;
create policy uploads_update on storage.objects for update to authenticated using (bucket_id = 'uploads');
